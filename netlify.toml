[build]
  publish = "public"
  functions = "netlify/functions"

# Avoid stale index.html after UI deploys (browser + CDN)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[functions]
  node_bundler = "esbuild"

[functions."scan-925"]
  timeout = 60

[functions."scan-955"]
  timeout = 60

[functions."scan-eod"]
  timeout = 60

[functions."scanner-core"]
  timeout = 60

[functions."scan-weekend"]
  timeout = 60

[functions."scan-3am"]
  timeout = 120

[functions."scan-now"]
  timeout = 60

[functions."ticker-intel"]
  timeout = 60

[functions."ai"]
  timeout = 45

[functions."ai-test"]
  timeout = 120

[functions."research-brief"]
  timeout = 60

[[redirects]]
  from = "/api/research-brief"
  to = "/.netlify/functions/research-brief"
  status = 200

