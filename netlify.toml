[build]
  command   = "node scripts/sync-version.js"
  publish   = "public"
  functions = "netlify/functions"

# Avoid stale index.html after UI deploys (browser + CDN)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Fresh JS after UI deploys (browser revalidates; CDN should not pin old bundles)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[functions]
  node_bundler = "esbuild"

# All schedules in UTC. EDT = UTC-4 (Mar-Nov). EST = UTC-5 (Nov-Mar).
# Update all hour values +1 in November when clocks fall back.

[functions."premarket"]
  schedule = "30 12 * * 1-5"
  timeout = 30
  # 8:30 AM EDT

[functions."scan-925"]
  schedule = "25 13 * * 1-5"
  timeout = 30
  # 9:25 AM EDT

[functions."scan-955"]
  schedule = "55 13 * * 1-5"
  timeout = 30
  # 9:55 AM EDT

[functions."brief-1pm"]
  schedule = "0 17 * * 1-5"
  timeout = 30
  # 1:00 PM EDT

[functions."scan-eod"]
  schedule = "5 20 * * 1-5"
  timeout = 60
  # 4:05 PM EDT

[functions."cheap-monitor"]
  schedule = "*/5 13-20 * * 1-5"
  timeout = 26
  # Every 5 min 9AM-4PM EDT

[functions."matrix-signal"]
  timeout = 30

[functions."scan"]
  timeout = 26

[functions."nightly-learn"]
  schedule = "0 2 * * 2-6"
  timeout = 60
  # 10 PM EDT Mon-Fri (2 AM UTC next day)

[[redirects]]
  from = "/api/research-brief"
  to = "/.netlify/functions/research-brief"
