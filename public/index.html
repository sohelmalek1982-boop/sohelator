<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>SOHELATOR</title>
  <meta name="sohel-build" content="verbatim-neon-cleanup-final" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Chakra+Petch:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lime: #39ff14;
      --cyan: #00f0ff;
      --magenta: #ff00ff;
      --amber: #ff9500;
      --bg: #0a0a0a;
      --card: #121212;
      --text: #eaeaea;
      --muted: rgba(220, 220, 230, 0.55);
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; }
    body.sohel-dark {
      min-height: 100%;
      background: radial-gradient(ellipse 120% 80% at 50% -30%, rgba(0, 240, 255, 0.06), transparent 55%), var(--bg);
      color: var(--text);
      font-family: "Chakra Petch", system-ui, sans-serif;
      padding: calc(12px + var(--safe-t)) 14px calc(100px + var(--safe-b));
      -webkit-font-smoothing: antialiased;
    }
    .sohel-header {
      font-family: "Bebas Neue", sans-serif;
      font-size: 2rem;
      letter-spacing: 0.2em;
      text-align: center;
      color: var(--cyan);
      text-shadow: 0 0 24px rgba(0, 240, 255, 0.35);
      margin-bottom: 14px;
    }
    .sohel-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .sohel-tab {
      flex: 1;
      min-height: 52px;
      border-radius: 14px;
      border: 2px solid rgba(0, 240, 255, 0.35);
      background: var(--card);
      color: var(--muted);
      font-family: "Bebas Neue", sans-serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    .sohel-tab.active {
      color: var(--lime);
      border-color: rgba(57, 255, 20, 0.7);
      box-shadow: 0 0 22px rgba(57, 255, 20, 0.2), inset 0 0 20px rgba(57, 255, 20, 0.06);
    }
    .sohel-page { display: none; }
    .sohel-page.active { display: block; }
    .sohel-regime, .sohel-watchlist {
      background: var(--card);
      border: 2px solid rgba(57, 255, 20, 0.3);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
      animation: neon-pulse 5s ease-in-out infinite;
    }
    .sohel-watchlist {
      border-color: rgba(0, 240, 255, 0.35);
    }
    .sohel-regime h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.35rem;
      letter-spacing: 0.08em;
      color: var(--lime);
      margin-bottom: 14px;
      text-shadow: 0 0 14px rgba(57, 255, 20, 0.25);
    }
    .sohel-watchlist h2, #alerts-page h2, #trades-page h2 {
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.15rem;
      letter-spacing: 0.1em;
      color: var(--cyan);
      margin-bottom: 12px;
    }
    #regime-content { font-size: 0.95rem; line-height: 1.45; }
    .sohel-pill {
      display: inline-block;
      font-family: "Space Mono", monospace;
      font-size: 0.65rem;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 0, 255, 0.4);
      color: var(--cyan);
      margin-bottom: 12px;
    }
    .sohel-spy-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 14px;
      background: rgba(0,0,0,0.45);
      border-radius: 12px;
      border: 1px solid rgba(57, 255, 20, 0.25);
      margin-bottom: 10px;
    }
    .sohel-spy-row .lab { font-family: "Space Mono", monospace; font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted); }
    .sohel-spy-row .px { font-family: "Bebas Neue", sans-serif; font-size: 2rem; color: var(--lime); }
    .levels-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }
    .level-cell {
      text-align: center;
      padding: 10px 6px;
      border-radius: 10px;
      border: 1px solid rgba(0, 240, 255, 0.2);
      background: rgba(0,0,0,0.35);
    }
    .level-cell.sohel-near-level {
      border-color: var(--magenta);
      box-shadow: 0 0 16px rgba(255, 0, 255, 0.25);
    }
    .level-cell .lv { font-family: "Space Mono", monospace; font-size: 0.55rem; color: var(--muted); }
    .level-cell .num { font-family: "Bebas Neue", sans-serif; font-size: 1.1rem; color: var(--lime); }
    .sohel-level-note { font-size: 0.7rem; color: var(--muted); margin-top: 6px; }
    .sohel-subh {
      font-family: "Bebas Neue", sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: var(--magenta);
      margin: 16px 0 8px;
    }
    .sohel-grok-body { color: var(--text); font-size: 0.88rem; }
    .sohel-grok-tag { font-family: "Space Mono", monospace; font-size: 0.62rem; color: var(--amber); margin-bottom: 6px; }
    .sohel-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .sohel-metric {
      text-align: center;
      padding: 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(57, 255, 20, 0.15);
    }
    .sohel-metric .ml { font-size: 0.55rem; color: var(--muted); font-family: "Space Mono", monospace; }
    .sohel-metric .mv { font-size: 1.1rem; font-weight: 700; color: var(--lime); }
    /* Watchlist radar — vertical stack (tiered cards, ALIGN-style) */
    .sohel-wl-stack { display: flex; flex-direction: column; gap: 20px; }
    .sohel-wl-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .sohel-wl-pill {
      font-family: "Bebas Neue", sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      padding: 6px 12px;
      border-radius: 999px;
      border: 2px solid currentColor;
    }
    .sohel-wl-section--fire .sohel-wl-pill { color: #ff3b3b; box-shadow: 0 0 16px rgba(255, 59, 59, 0.25); }
    .sohel-wl-section--heat .sohel-wl-pill { color: #ff9500; box-shadow: 0 0 14px rgba(255, 149, 0, 0.2); }
    .sohel-wl-section--watch .sohel-wl-pill { color: var(--muted); border-color: rgba(200,200,210,0.35); }
    .sohel-wl-sub { font-family: "Space Mono", monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.08em; }
    .sohel-wl-cards { display: flex; flex-direction: column; gap: 12px; }
    .sohel-radar-card {
      position: relative;
      display: flex;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(20,20,24,0.98) 0%, rgba(10,10,12,0.99) 100%);
      border: 1px solid rgba(255,255,255,0.06);
      min-height: 88px;
    }
    .sohel-radar-accent {
      width: 5px;
      flex-shrink: 0;
    }
    .sohel-radar-card--fire .sohel-radar-accent { background: linear-gradient(180deg, #ff5555, #cc0000); box-shadow: 0 0 12px rgba(255,60,60,0.5); }
    .sohel-radar-card--heat .sohel-radar-accent { background: linear-gradient(180deg, #ffb020, #ff6600); box-shadow: 0 0 10px rgba(255,149,0,0.35); }
    .sohel-radar-card--watch .sohel-radar-accent { background: linear-gradient(180deg, #555, #333); }
    .sohel-radar-body { flex: 1; padding: 14px 14px 12px 12px; }
    .sohel-radar-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .sohel-radar-sym {
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.65rem;
      letter-spacing: 0.06em;
      line-height: 1;
    }
    .sohel-radar-card--fire .sohel-radar-sym { color: #ff6b6b; text-shadow: 0 0 18px rgba(255,80,80,0.35); }
    .sohel-radar-card--heat .sohel-radar-sym { color: #ffb347; text-shadow: 0 0 14px rgba(255,160,60,0.25); }
    .sohel-radar-card--watch .sohel-radar-sym { color: var(--cyan); }
    .sohel-radar-badges { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex: 1; justify-content: flex-end; }
    .sohel-badge {
      font-family: "Space Mono", monospace;
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid currentColor;
      line-height: 1.2;
    }
    .sohel-badge--go { color: #ff4444; background: rgba(255,68,68,0.12); }
    .sohel-badge--heat { color: #ff9500; background: rgba(255,149,0,0.12); }
    .sohel-badge--cat { color: var(--amber); background: rgba(255,149,0,0.15); }
    .sohel-badge--play { color: var(--cyan); background: rgba(0,240,255,0.1); }
    .sohel-badge--dir { color: var(--magenta); background: rgba(255,0,255,0.08); }
    .sohel-radar-score { text-align: right; min-width: 52px; }
    .sohel-radar-score span {
      font-family: "Bebas Neue", sans-serif;
      font-size: 1.5rem;
      display: block;
      line-height: 1;
    }
    .sohel-radar-card--fire .sohel-radar-score span { color: #ff6b6b; }
    .sohel-radar-card--heat .sohel-radar-score span { color: #ffaa44; }
    .sohel-radar-card--watch .sohel-radar-score span { color: var(--muted); }
    .sohel-radar-score--na span { color: var(--muted); font-size: 1.1rem; }
    .sohel-radar-bar {
      height: 4px;
      margin-top: 6px;
      border-radius: 2px;
      background: linear-gradient(90deg, currentColor, transparent);
      max-width: 100%;
    }
    .sohel-radar-card--fire .sohel-radar-bar { color: #ff4444; opacity: 0.85; }
    .sohel-radar-card--heat .sohel-radar-bar { color: #ff9500; opacity: 0.85; }
    .sohel-radar-card--watch .sohel-radar-bar { color: var(--cyan); opacity: 0.4; }
    .sohel-radar-price { font-family: "Chakra Petch", sans-serif; font-size: 1rem; font-weight: 600; color: var(--text); }
    .sohel-radar-opt {
      margin-top: 8px;
      font-family: "Space Mono", monospace;
      font-size: 0.68rem;
      color: var(--lime);
      letter-spacing: 0.03em;
      line-height: 1.35;
    }
    .sohel-radar-opt--muted { color: var(--muted); font-size: 0.62rem; }
    .sohel-alerts-list, .sohel-trades-list { display: flex; flex-direction: column; gap: 14px; }
    .ap-drive-card {
      border: 2px solid rgba(57, 255, 20, 0.35);
      border-radius: 16px;
      padding: 16px;
      font-size: 0.95rem;
      line-height: 1.4;
      background: var(--card);
    }
    .ap-time {
      font-family: "Space Mono", monospace;
      font-size: 0.72rem;
      color: var(--cyan);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .ap-contract {
      font-family: "Space Mono", monospace;
      font-size: 0.68rem;
      color: var(--lime);
      letter-spacing: 0.03em;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(57, 255, 20, 0.2);
    }
    .ap-hist { margin-top: 10px; font-size: 0.78rem; color: var(--muted); border-top: 1px solid rgba(0,240,255,0.15); padding-top: 10px; }
    .tm-muted { color: var(--muted); font-size: 0.8rem; }
    .tm-open-card {
      border: 2px solid rgba(255, 149, 0, 0.45);
      border-radius: 16px;
      padding: 16px;
      background: var(--card);
    }
    .tm-row { font-size: 1rem; margin-bottom: 8px; }
    .tm-exit-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 12px; }
    .tm-exit-row input, .tm-exit-row select {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(0, 240, 255, 0.3);
      background: #0a0a0a;
      color: var(--text);
      font-size: 1rem;
      min-height: 48px;
    }
    .tm-btn-enter, .tm-btn-exit, .tm-btn-action {
      min-height: 48px;
      padding: 0 16px;
      border-radius: 12px;
      border: 2px solid var(--lime);
      background: rgba(57, 255, 20, 0.12);
      color: var(--lime);
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.08em;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .tm-btn-exit { border-color: var(--amber); color: var(--amber); background: rgba(255, 149, 0, 0.1); }
    .tm-btn-action { border-color: var(--cyan); color: var(--cyan); background: rgba(0, 240, 255, 0.08); margin-right: 8px; margin-bottom: 6px; }
    .tm-trade-wrap { margin-top: 12px; }
    .sohel-health {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(10px + var(--safe-b));
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(57, 255, 20, 0.35);
      background: rgba(10, 10, 10, 0.94);
      font-family: "Space Mono", monospace;
      font-size: 0.62rem;
      line-height: 1.5;
      color: #bef264;
      z-index: 100;
      text-align: center;
    }
    .sohel-health.sohel-health--stale {
      border-color: rgba(255, 149, 0, 0.5);
      color: var(--amber);
    }
    .hint { color: var(--muted); font-size: 0.9rem; }
    @keyframes neon-pulse {
      0%, 100% { box-shadow: 0 0 0 1px rgba(57, 255, 20, 0.1), 0 8px 28px rgba(0,0,0,0.5); }
      50% { box-shadow: 0 0 0 1px rgba(0, 240, 255, 0.18), 0 8px 32px rgba(57, 255, 20, 0.06); }
    }
    @keyframes neon-flash {
      0% { box-shadow: 0 0 0 2px rgba(57, 255, 20, 0.75), 0 0 24px rgba(0, 240, 255, 0.35); border-color: rgba(57, 255, 20, 0.95); }
      100% { box-shadow: none; border-color: rgba(57, 255, 20, 0.35); }
    }
    @keyframes regime-flash {
      0% { filter: brightness(1.25); }
      100% { filter: brightness(1); }
    }
    @keyframes neon-amber-pulse {
      0%, 100% { box-shadow: 0 0 0 1px rgba(255, 149, 0, 0.4); }
      50% { box-shadow: 0 0 20px rgba(255, 149, 0, 0.35); }
    }
    #sohel-regime-header.regime-flash { animation: regime-flash 0.85s ease-out; }
    .tm-open-card.neon-amber-pulse { animation: neon-amber-pulse 0.65s ease-out; }
    .ap-drive-card.neon-flash { animation: neon-flash 0.75s ease-out; }
  </style>
</head>
<body class="sohel-dark">
  <div class="sohel-header">SOHELATOR</div>

  <!-- Top tab bar -->
  <div class="sohel-tabs">
    <button id="tab-home" class="sohel-tab active">HOME</button>
    <button id="tab-alerts" class="sohel-tab">ALERTS</button>
    <button id="tab-trades" class="sohel-tab">OPEN TRADES</button>
  </div>

  <!-- HOME PAGE -->
  <div id="home-page" class="sohel-page active">
    <div class="sohel-regime">
      <h1>TODAY’S REGIME ANALYSIS</h1>
      <div id="regime-content"></div>
    </div>
    <div class="sohel-watchlist">
      <h2>WATCHLIST RADAR</h2>
      <div id="watchlist-grid" class="sohel-wl-stack"></div>
    </div>
  </div>

  <!-- ALERTS PAGE -->
  <div id="alerts-page" class="sohel-page">
    <h2>ALL ALERTS</h2>
    <div id="alerts-list" class="sohel-alerts-list"></div>
  </div>

  <!-- OPEN TRADES PAGE -->
  <div id="trades-page" class="sohel-page">
    <h2>OPEN TRADES</h2>
    <div id="open-trades-list" class="sohel-trades-list"></div>
  </div>

  <!-- Health banner -->
  <div id="health-banner" class="sohel-health"></div>

  <!-- UI/JS deploy: (1) bump version in package.json (e.g. 1.1.1→1.1.2) — scripts/sync-version.js handles the rest automatically. -->
  <script src="/ignition.js?v=1.1.3"></script>
</body>
</html>
